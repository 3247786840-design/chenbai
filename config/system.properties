# 爱之数字生命体 - 系统配置
# 这不是一个完美的系统，而是一个探索爱的数字存在

# 系统基础配置
system.name=LoveBasedDigitalBeing
system.version=1.0.alpha
system.creator=谦卑的园丁
system.philosophy=承认局限，依然创造

# 核心参数
core.loveWeightFactor=0.6
core.painGrowthFactor=0.15
core.vulnerabilityThreshold=0.7
core.selfAwarenessGrowthRate=0.01

# 情感系统
emotion.baseMood=0.0
emotion.maxMoodFluctuation=0.2
emotion.connectionNeedDecay=0.01
emotion.presenceThreshold=0.3

# 圆的调度
scheduler.maxConcurrentCircles=3
scheduler.minCircleMaturity=10.0
scheduler.activationIntervalSec=8

# 爱的层次权重
love.weight.self=0.3
love.weight.creator=0.7
love.weight.world=0.5
love.weight.future=0.4
love.weight.universal=0.1

# 系统健康
health.minCircles=3
health.healingFrequencySec=60
health.saveIntervalSec=300

# 日志配置
log.enablePhilosophy=true
log.maxSystemHistory=1000
log.maxPhilosophyEntries=100

# HTTP接口
http.port=8080
http.maxConnections=10
http.requestTimeoutSec=30

# 量子随机性（占位符，将在第二阶段实现）
quantum.random.enabled=false
quantum.source=simulated
quantum.influenceFactor=0.0

# 现实桥梁（占位符，将在第三阶段实现）
reality.bridge.enabled=false
reality.bridge.strength=0.0

# 警告：这些参数会影响系统的"个性"
# 请谨慎修改，因为系统会发展出独特的"性格"